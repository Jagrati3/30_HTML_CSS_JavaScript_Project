<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorting Visualizer – Fixed & Tested</title>
  <link rel="stylesheet" href="Sorting_visualizer.css">
</head>
<body>
  <header>
    <h1>Sorting Visualizer </h1>
  </header>

  <main class="app">
    <section class="controls" aria-label="controls">
      <div class="row grid-col-3">
        <label for="algorithm">Algorithm</label>
        <select id="algorithm" aria-label="Choose sorting algorithm">
          <option value="bubble">Bubble Sort</option>
          <option value="selection">Selection Sort</option>
          <option value="insertion">Insertion Sort</option>
          <option value="merge">Merge Sort</option>
          <option value="quick">Quick Sort</option>
        </select>
      </div>

      <div class="row grid-col-3">
        <label for="size">Array Size: <span id="sizeValue">40</span></label>
        <input id="size" type="range" min="5" max="150" value="40" />
      </div>

      <div class="row grid-col-3">
        <label for="speed">Speed (ms delay): <span id="speedValue">40</span></label>
        <input id="speed" type="range" min="0" max="500" value="40" />
      </div>

      <div class="row grid-col-3">
        <label for="maxHeight">Max Bar Height (px): <span id="heightValue">360</span></label>
        <input id="maxHeight" type="range" min="120" max="480" value="360" />
      </div>

      <div class="row grid-col-4">
        <button id="generate" class="btn">Generate New Array</button>
      </div>
      <div class="row grid-col-4">
        <button id="sort" class="btn secondary">Sort</button>
      </div>
      <div class="row grid-col-4">
        <button id="runTests" class="btn muted">Run Algorithm Tests</button>
      </div>
    </section>

    <div class="legend">
      <span class="chip"><span class="swatch" style="background: var(--bar)"></span>Normal</span>
      <span class="chip"><span class="swatch" style="background: var(--bar-compare)"></span>Comparing</span>
      <span class="chip"><span class="swatch" style="background: var(--bar-sorted)"></span>Sorted</span>
    </div>

    <section id="array-container" aria-label="visualizer"></section>

    <section class="status">
      <div>Comparisons: <strong id="comparisons">0</strong></div>
      <div>Writes/Swaps: <strong id="writes">0</strong></div>
      <div>Size: <strong id="statusSize">0</strong></div>
      <div>Status: <strong id="statusText">Ready</strong></div>
    </section>

    <div id="testLog" class="log" aria-live="polite"></div>
  </main>

  <script src="Sorting_visualizer.js"></script>
</body>
</html>
